<style>

body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;line-height:1.7}

.header{background:linear-gradient(160deg,#12100E 0%,#1E1A16 50%,#12100E 100%);position:relative;overflow:hidden}.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(247,147,30,.1) 0%,transparent 60%);pointer-events:none}.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),rgba(247,147,30,.2),var(--gold))}
.header-inner{max-width:720px;margin:0 auto;padding:28px 24px 24px;position:relative;z-index:1}
.logo-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.logo-sun{width:44px;height:44px;border-radius:50%;background:conic-gradient(var(--gold) 0deg,var(--ember) 180deg,var(--gold) 360deg);box-shadow:0 0 20px rgba(247,147,30,.3);display:flex;align-items:center;justify-content:center;font-size:22px;animation:ps 3s ease-in-out infinite}
@keyframes ps{0%,100%{box-shadow:0 0 20px rgba(247,147,30,.3)}50%{box-shadow:0 0 28px rgba(247,147,30,.5)}}
.logo-text{font-family:'Playfair Display',serif;color:#fff;font-size:20px;font-weight:900;letter-spacing:-0.01em}.logo-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.18em;text-transform:uppercase;font-weight:600}
.header-headline{font-family:'Playfair Display',serif;font-size:clamp(22px,4.5vw,32px);color:#fff;font-weight:900;line-height:1.1;letter-spacing:-0.02em}.header-headline em{color:var(--gold-soft);font-style:normal}

.progress-wrap{margin-bottom:28px}.progress-top{display:flex;justify-content:space-between;margin-bottom:8px}

.map-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.map-btn{padding:10px 16px;border-radius:50px;border:1.5px solid var(--warm-border);background:#fff;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;color:var(--navy);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}

.coords-display{background:#fff;border:1px solid var(--warm-border);border-radius:50px;padding:10px 14px;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--navy);display:none;align-items:center;gap:8px;flex-wrap:wrap}
.coords-display .cl{font-family:'Outfit',sans-serif;font-size:11px;color:var(--warm-gray);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.coords-display .cv{color:var(--gold);font-weight:600}
.pin-status{font-size:12px;margin-top:8px;padding:8px 12px;border-radius:50px;display:none;font-weight:500}
.pin-status.ok{display:block;background:rgba(45,122,58,.08);color:#2D7A3A;border:1px solid rgba(45,122,58,.2)}
.pin-status.err{display:block;background:rgba(201,75,26,.08);color:var(--ember);border:1px solid rgba(201,75,26,.2)}
.addr-res{background:rgba(247,147,30,.06);border:1px solid rgba(247,147,30,.18);border-radius:var(--radius);padding:10px 14px;margin-top:10px;font-size:13px;color:#92700C;line-height:1.6;display:none;font-weight:300}
.addr-res strong{color:#78350F}
.search-row{display:flex;gap:8px;margin-bottom:12px}.search-row .q-input{flex:1;padding:12px 16px;font-size:14px}
.search-btn{padding:12px 20px;border-radius:50px;border:none;background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s}
.search-btn:hover{background:#1E1A16}
/* Battery slider */
.slider-wrap{margin:20px 0}
.slider-wrap input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--navy),var(--gold));outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:var(--gold);border:3px solid #fff;box-shadow:0 2px 8px rgba(18,16,14,.2);cursor:pointer}
.slider-val{text-align:center;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--navy);margin:10px 0}

/* Nav */
.nav-row{display:flex;justify-content:space-between;margin-top:24px}
.btn{padding:13px 28px;border-radius:50px;border:none;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s}
.btn-next{background:var(--gold);color:var(--navy);box-shadow:0 4px 16px rgba(247,147,30,.2)}.btn-next:hover{background:var(--gold-soft);transform:translateY(-2px)}
.btn-back{background:transparent;color:var(--warm-gray);border:1.5px solid var(--warm-border)}.btn-back:hover{color:var(--text);border-color:var(--gold)}
/* Modal */

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:var(--radius);max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:32px 28px;box-shadow:0 20px 60px rgba(18,16,14,.4);position:relative}
.modal-box h2{font-family:'Playfair Display',serif;color:var(--navy);font-size:20px;margin-bottom:16px;font-weight:700}
.modal-box .close-btn{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:none;background:rgba(18,16,14,.06);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-box .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
@media(max-width:500px){.modal-box .compare-grid{grid-template-columns:1fr}}
.compare-card{border:1.5px solid var(--warm-border);border-radius:var(--radius);padding:20px;text-align:center}
.compare-card h3{font-size:16px;color:var(--navy);margin-bottom:8px;font-weight:700}.compare-card .icon{font-size:36px;margin-bottom:8px}
.compare-card ul{text-align:left;font-size:13px;color:var(--text-dim);padding-left:18px;line-height:1.8;font-weight:300}
.modal-back-btn{margin-top:16px;width:100%;padding:14px;border-radius:50px;border:1.5px solid var(--navy);background:transparent;color:var(--navy);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer}
/* Results */
.result-wrap{animation:su .5s ease}
.result-hero{background:linear-gradient(160deg,#12100E 0%,#1E1A16 50%,#12100E 100%);border-radius:var(--radius);padding:36px 28px;text-align:center;position:relative;overflow:hidden;margin-bottom:20px}
.result-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(247,147,30,.1) 0%,transparent 65%);pointer-events:none}
.result-hero h2{font-family:'Playfair Display',serif;color:#fff;font-size:22px;position:relative;font-weight:900}
.result-hero .rs{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--gold-soft);margin:12px 0 4px;position:relative}
.result-hero .ru{font-size:14px;color:rgba(255,255,255,.4);letter-spacing:.1em;position:relative;font-weight:300}
.sc{background:#fff;border:1px solid var(--warm-border);border-radius:var(--radius);padding:24px 28px;box-shadow:0 2px 16px var(--shadow);margin-bottom:16px}
.sc h3{font-family:'Playfair Display',serif;font-size:16px;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:700}
.st{width:100%;font-size:14px}.st tr td{padding:8px 0;border-bottom:1px solid rgba(18,16,14,.04)}.st tr:last-child td{border-bottom:none}
.st .sl{color:var(--text-dim);font-weight:400;width:50%}.st .sv{font-weight:600;color:var(--navy);text-align:right}
.st .sv.mono{font-family:'JetBrains Mono',monospace;font-size:13px}

/* 3-Tier Options */
.options-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}

.opt-card{background:#fff;border-radius:var(--radius);padding:20px 16px;box-shadow:0 2px 16px var(--shadow);text-align:center;position:relative;overflow:hidden;transition:transform .2s;border:1px solid var(--warm-border)}
.opt-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(18,16,14,.09)}
.opt-card.entry{border-top:4px solid var(--entry)}

.opt-card.high{border-top:4px solid var(--high)}
.opt-badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:3px 12px;border-radius:50px;margin-bottom:10px}
.opt-card.entry .opt-badge{background:rgba(27,79,138,.1);color:var(--entry)}

.opt-card .opt-sub{font-size:11px;color:var(--text-dim);margin-bottom:12px;font-weight:300}
.opt-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(18,16,14,.04);font-size:12px}
.opt-row:last-child{border:none}
.opt-row .lbl{color:var(--text-dim);font-weight:300}.opt-row .val{font-weight:600;color:var(--text)}

.opt-per-wp{font-size:11px;color:var(--text-dim);margin-bottom:6px;font-weight:300}

/* ROI Grid */
.roi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
@media(max-width:600px){.roi-grid{grid-template-columns:1fr}}
.roi-card{background:#fff;border-radius:var(--radius);padding:18px;box-shadow:0 2px 12px var(--shadow);text-align:center;border:1px solid var(--warm-border)}
.roi-card.entry{border-left:4px solid var(--entry)}
.roi-card.mid{border-left:4px solid var(--gold)}
.roi-card.high{border-left:4px solid var(--high)}
.roi-years{font-family:'Playfair Display',serif;font-size:28px;color:var(--navy);font-weight:700}

.note-box strong{color:#78350F}

.cta-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 120%,rgba(247,147,30,.08) 0%,transparent 60%);pointer-events:none}

.btn-gold{padding:14px 36px;border-radius:50px;border:none;background:var(--gold);color:var(--navy);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(247,147,30,.25);transition:all .25s;position:relative}
.btn-gold:hover{background:var(--gold-soft);transform:translateY(-2px)}
.footer-bar{text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid rgba(18,16,14,.06);font-size:11px;color:var(--warm-gray);font-weight:300}.footer-bar strong{color:var(--navy)}

.field-error{border-color:var(--ember)!important;box-shadow:0 0 0 4px rgba(201,75,26,.08)!important}

.avg-box{background:rgba(247,147,30,.06);border:1.5px solid rgba(247,147,30,.2);border-radius:var(--radius);padding:16px 20px;text-align:center;margin-top:14px}

.avg-box .avg-sub{font-size:11px;color:var(--text-dim);margin-top:2px;font-weight:300}

function mkIcon(){return L.divIcon({className:'',iconSize:[32,32],iconAnchor:[16,32],html:'<div style="width:32px;height:32px;background:conic-gradient(#F7931E 0deg,#C94B1A 180deg,#F7931E 360deg);border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 12px rgba(18,16,14,.3);display:flex;align-items:center;justify-content:center"><span style="transform:rotate(45deg);font-size:14px">"</span></div>'})}
function initMap(){
  locMarker=null;
  if(locMap){try{locMap.remove()}catch(e){};locMap=null}
  const el=document.getElementById('locMap');
  if(!el)return;
  const lat=A._lat||13.9417,lng=A._lng||121.1632,z=A._lat?17:12;
  locMap=L.map('locMap',{zoomControl:true,tap:true}).setView([lat,lng],z);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(locMap);
  if(A._lat&&A._lng){
    locMarker=L.marker([A._lat,A._lng],{icon:mkIcon(),draggable:true}).addTo(locMap);
    locMarker.on('dragend',onMarkerDrag);
    showCoords(A._lat,A._lng);
  }
  locMap.on('click',function(e){
    const lat=e.latlng.lat,lng=e.latlng.lng;
    // Check if clicked on land via reverse geocode before placing pin
    const ps=document.getElementById('pStat');
    if(ps){ps.className='pin-status ok';ps.textContent='Checking location...'}
    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,{headers:{'Accept-Language':'en'}})
    .then(r=>r.json()).then(d=>{
      if(d?.error||!d?.address||(d.address.natural&&/water|sea|ocean|bay|strait|lake|river/i.test(d.address.natural))||(!d.address.country&&!d.address.city&&!d.address.town&&!d.address.village&&!d.address.municipality&&!d.address.suburb)){
        if(ps){ps.className='pin-status err';ps.textContent='That\'s water! Please pin a location on land.'}
        return;
      }
      if(locMarker){locMarker.setLatLng([lat,lng])}else{
        locMarker=L.marker([lat,lng],{icon:mkIcon(),draggable:true}).addTo(locMap);
        locMarker.on('dragend',onMarkerDrag);
      }
      A._lat=lat;A._lng=lng;showCoords(lat,lng);
      A._addr=d.display_name;
      if(d.address){A._city=d.address.city||d.address.town||d.address.municipality||'';A._prov=d.address.state||d.address.province||'';A._brgy=d.address.suburb||d.address.village||d.address.neighbourhood||''}
      const ae=document.getElementById('aRes');if(ae){ae.style.display='block';ae.innerHTML=`<strong></strong> ${d.display_name}`}
      const inp=document.getElementById('iAddr');if(inp)inp.value=d.display_name;
    }).catch(()=>{
      // Offline fallback - allow pin but warn
      if(locMarker){locMarker.setLatLng([lat,lng])}else{
        locMarker=L.marker([lat,lng],{icon:mkIcon(),draggable:true}).addTo(locMap);
        locMarker.on('dragend',onMarkerDrag);
      }
      A._lat=lat;A._lng=lng;showCoords(lat,lng);
      if(ps){ps.className='pin-status ok';ps.textContent='Pin placed (address lookup unavailable).'}
    });
  });
  setTimeout(()=>locMap.invalidateSize(),200);
  setTimeout(()=>locMap.invalidateSize(),500);
  setTimeout(()=>locMap.invalidateSize(),1000);
}
function onMarkerDrag(e){const p=e.target.getLatLng();A._lat=p.lat;A._lng=p.lng;showCoords(p.lat,p.lng);revGeo(p.lat,p.lng,true)}
function placePin(lat,lng){
  if(locMarker){locMarker.setLatLng([lat,lng])}else{
    locMarker=L.marker([lat,lng],{icon:mkIcon(),draggable:true}).addTo(locMap);
    locMarker.on('dragend',onMarkerDrag);
  }
  A._lat=lat;A._lng=lng;showCoords(lat,lng);revGeo(lat,lng,true);
}
function showCoords(lat,lng){const e=document.getElementById('cDisp');if(e){e.innerHTML=`<span class="cl">Lat:</span> <span class="cv">${lat.toFixed(6)}</span><span style="color:#ddd;margin:0 4px">|</span><span class="cl">Lng:</span> <span class="cv">${lng.toFixed(6)}</span>`;e.style.display='flex'}const p=document.getElementById('pStat');if(p){p.className='pin-status ok';p.textContent='Pin placed! Drag to fine-tune.'}}
function revGeo(lat,lng,updateSearchBar){const e=document.getElementById('aRes');if(e){e.style.display='block';e.innerHTML='Looking up address...'}fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,{headers:{'Accept-Language':'en'}}).then(r=>r.json()).then(d=>{if(d?.display_name){A._addr=d.display_name;if(d.address){A._city=d.address.city||d.address.town||d.address.municipality||'';A._prov=d.address.state||d.address.province||'';A._brgy=d.address.suburb||d.address.village||d.address.neighbourhood||''}if(e)e.innerHTML=`<strong></strong> ${d.display_name}`;const inp=document.getElementById('iAddr');if(inp&&updateSearchBar)inp.value=d.display_name}}).catch(()=>{if(e)e.innerHTML='Could not resolve - coordinates saved.'})}

}

function processBillImage(input, billNumber) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    // Show image preview immediately
    const previewDiv = document.getElementById(`preview${billNumber}`);
    if (previewDiv) {
      previewDiv.innerHTML = `<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;cursor:pointer;" onclick="viewFullImage(${billNumber - 1})">`;
    }
    
    // Store the image data
    uploadedBillImages[billNumber - 1] = {
      data: e.target.result,
      name: file.name,
      size: file.size,
      type: file.type
    };
    
    const img = new Image();
    img.onload = function() {
      // Create canvas for image processing
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      // Resize image for better OCR
      const maxWidth = 1200;
      const maxHeight = 1600;
      let width = img.width;
      let height = img.height;
      
      if (width > maxWidth) {
        height = (maxWidth / width) * height;
        width = maxWidth;
      }
      if (height > maxHeight) {
        width = (maxHeight / height) * width;
        height = maxHeight;
      }
      
      canvas.width = width;
      canvas.height = height;
      ctx.drawImage(img, 0, 0, width, height);
      
      const resultDiv = document.getElementById('ocrResult');
      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `
        <div style="font-weight:600;color:var(--navy);margin-bottom:8px">Processing Bill ${billNumber}...</div>
        <div style="font-size:13px;color:var(--text-dim);">Analyzing text from your electricity bill...</div>
        <div style="margin-top:12px;">
          <div style="width:100%;height:4px;background:rgba(247,147,30,.2);border-radius:2px;overflow:hidden;">
            <div id="progressBar${billNumber}" style="width:0%;height:100%;background:var(--gold);transition:width 0.3s;"></div>
          </div>
        </div>
      `;
      
      // Use real Tesseract.js OCR
      Tesseract.recognize(
        canvas.toDataURL(),
        'eng', // English language
        {
          logger: (m) => {
            if (m.status === 'recognizing text') {
              const progress = Math.round(m.progress * 100);
              const progressBar = document.getElementById(`progressBar${billNumber}`);
              if (progressBar) {
                progressBar.style.width = progress + '%';
              }
            }
          }
        }
      ).then(({ data: { text } }) => {
        console.log(`OCR Result for Bill ${billNumber}:`, text);
        
        // Extract bill amounts from OCR text
        const extractedAmounts = extractBillAmounts(text);
        
        let resultHTML = '<div style="font-weight:600;color:var(--green);margin-bottom:12px">Bill ${billNumber} Analysis Complete</div>';
        
        if (extractedAmounts.length > 0) {
          // Auto-fill the corresponding month directly
          const amount = extractedAmounts[0];
          document.getElementById(`iBill${billNumber}`).value = amount.toFixed(2);
          calcBillAverage();
          
          resultHTML += `
            <div style="padding:12px;background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.2);border-radius:8px;text-align:center;">
              <div style="font-size:14px;margin-bottom:4px"><strong>Month ${billNumber} Bill Amount:</strong></div>
              <div style="font-size:20px;font-weight:700;color:var(--gold);margin-bottom:4px">${amount.toFixed(2)}</div>
              <div style="font-size:12px;color:var(--text-dim);">Automatically filled</div>
            </div>
          `;
          
          // Store the extracted amount
          uploadedBills[billNumber - 1] = [amount];
        } else {
          resultHTML += '<div style="color:var(--text-dim);font-size:13px;">No bill amounts detected. Please try a clearer image or enter manually.</div>';
        }
        
        resultHTML += `
          <div style="margin-top:8px;font-size:11px;color:var(--text-dim);text-align:left;">
            <details>
              <summary style="cursor:pointer;color:var(--gold);">View OCR Text</summary>
              <div style="margin-top:8px;padding:8px;background:rgba(18,16,14,.05);border-radius:4px;font-family:monospace;font-size:11px;max-height:100px;overflow-y:auto;">
                ${text.substring(0, 500)}${text.length > 500 ? '...' : ''}
              </div>
            </details>
          </div>
        `;
        
        resultDiv.innerHTML = resultHTML;
        
        // Check if all 3 bills are uploaded
        checkAllBillsUploaded();
      }).catch((error) => {
        console.error('OCR Error:', error);
        resultDiv.innerHTML = `
          <div style="font-weight:600;color:#e74c3c;margin-bottom:12px">OCR Processing Failed</div>
          <div style="font-size:13px;color:var(--text-dim);margin-bottom:12px">Unable to process the image. Please try a clearer photo or enter amounts manually.</div>
          <button onclick="autoFillAllBills()" style="background:var(--gold);color:var(--navy);border:none;padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer">Enter Manually</button>
        `;
      });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function extractBillAmounts(text) {
  const amounts = [];
  
  // Common patterns for Philippine electricity bills
  const patterns = [
    // Amount with peso sign and decimal
    /[\s\S]*?[\u20B1$]\s*([\d,]+\.?\d*)/gi,
    // Total amount patterns
    /total\s*amount[\s\S]*?[\u20B1$]\s*([\d,]+\.?\d*)/gi,
    /amount\s*due[\s\S]*?[\u20B1$]\s*([\d,]+\.?\d*)/gi,
    /current\s*amount[\s\S]*?[\u20B1$]\s*([\d,]+\.?\d*)/gi,
    // Just numbers with commas and decimals (likely amounts)
    /([\d,]+\.\d{2})/g,
    // Numbers with commas (amounts without decimals)
    /([\d,]{4,})/g
  ];
  
  patterns.forEach(pattern => {
    const matches = text.match(pattern);
    if (matches) {
      matches.forEach(match => {
        // Extract the numeric part
        const numMatch = match.match(/([\d,]+\.?\d*)/);
        if (numMatch) {
          const amount = parseFloat(numMatch[1].replace(/,/g, ''));
          // Filter for reasonable bill amounts (100 to 100,000 pesos)
          if (amount >= 100 && amount <= 100000) {
            if (!amounts.includes(amount)) {
              amounts.push(amount);
            }
          }
        }
      });
    }
  });
  
  // Sort amounts and return top 3 most likely
  return amounts.sort((a, b) => b - a).slice(0, 3);
}

function useGPS(){
  const ps=document.getElementById('pStat');
  if(!navigator.geolocation){
    if(ps){ps.className='pin-status err';ps.textContent='GPS not available on this device or browser. Try searching your address instead.'}
    return;
  }
  if(ps){ps.className='pin-status ok';ps.textContent='Requesting your location... Please allow when prompted.'}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude,lng=pos.coords.longitude;
      if(locMap)locMap.setView([lat,lng],17);
      placePin(lat,lng);
      if(ps){ps.className='pin-status ok';ps.textContent='GPS location found! Drag the pin to fine-tune.'}
    },
    function(err){
      var msg='';
      switch(err.code){
        case 1:msg+='Location permission denied. Please allow location access in your browser settings, or search/tap the map instead.';break;
        case 2:msg+='Could not determine your location. Please search your address or tap the map.';break;
        case 3:msg+='Location request timed out. Please try again, search your address, or tap the map.';break;

      }

function isValidName(v){return /^[A-Za-zÀ-ÿñÑ\s.\-,()&']+$/.test(v)&&v.length>=2}
function isValidPhone(v){const digits=v.replace(/\D/g,'');return digits.length>=10&&digits.length<=11}
function isValidEmail(v){return !v||/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)}
function isPositiveNum(v){return !isNaN(v)&&parseFloat(v)>0}
function showFieldError(id,msg){
  const el=document.getElementById(id);if(el)el.classList.add('field-error');
  const em=document.getElementById(id+'Err');if(em){em.textContent=msg;em.classList.add('show')}
}
function clearFieldError(id){
  const el=document.getElementById(id);if(el)el.classList.remove('field-error');
  const em=document.getElementById(id+'Err');if(em)em.classList.remove('show');
}
function preventNonNumeric(e){
  // Allow: backspace, delete, tab, escape, enter, decimal point, arrow keys
  if([46,8,9,27,13,110,190].includes(e.keyCode)||
    (e.keyCode>=35&&e.keyCode<=40)||
    (e.ctrlKey&&[65,67,86,88].includes(e.keyCode))) return;
  if((e.shiftKey||(e.keyCode<48||e.keyCode>57))&&(e.keyCode<96||e.keyCode>105)) e.preventDefault();
}
function preventNumeric(e){
  if(e.key&&/\d/.test(e.key)&&!e.ctrlKey&&!e.metaKey) e.preventDefault();
}
function calcBillAverage(){
  const b1=parseFloat(document.getElementById('iBill1')?.value)||0;
  const b2=parseFloat(document.getElementById('iBill2')?.value)||0;
  const b3=parseFloat(document.getElementById('iBill3')?.value)||0;
  let count=0,sum=0;
  if(b1>0){count++;sum+=b1}
  if(b2>0){count++;sum+=b2}
  if(b3>0){count++;sum+=b3}
  const avg=count>0?(sum/count):0;
  const el=document.getElementById('avgBox');
  if(el){
    if(avg>0){
      el.style.display='block';
      el.innerHTML=`<div class="avg-label">Average Monthly Bill</div><div class="avg-val">${avg.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2})}</div><div class="avg-sub">This will be used as the basis for system sizing</div>`;
    }else{el.style.display='none'}
  }
  A._billAvg=avg;
}

  // TIER CALCULATOR
  function calcTier(t, monthlyKwh, kwhRate){
    const p=t.panel, inv=t.inv||{}, mk=t.markup;
    const dailyKwh=monthlyKwh/30;
    const neededKwp=dailyKwh/(PSH*(1-LOSS));
    const nP=Math.max(Math.ceil(neededKwp*1000/p.w),2);
    const actualKwp=nP*p.w/1000;
    const sC=Math.max(1,Math.ceil(nP/10));
    const rQ=Math.round(nP*1.8),lfQ=rQ*4,rcQ=rQ,mcQ=nP*3+6,ecQ=sC*10;
    const pvQ=sC*30,hdQ=Math.round(pvQ/2),pcQ=hdQ*3,peQ=Math.round(hdQ/2);

    let mat=0;
    mat+=nP*p.price; mat+=inv.price||0;
    if(t.batt) mat+=t.batt.price;
    mat+=rQ*t.mount.rail+lfQ*t.mount.lfoot+rcQ*t.mount.rcon+mcQ*t.mount.mid+ecQ*t.mount.end;
    mat+=sC*t.prot.dcmcb+sC*t.prot.dcspd+t.prot.acmcb+t.prot.acspd;
    if(t.prot.ats) mat+=t.prot.ats;
    if(t.prot.battmccb) mat+=t.prot.battmccb;
    if(t.prot.rsd) mat+=t.prot.rsd;
    mat+=pvQ*t.wire.pv+t.wire.gnd+t.wire.ac+hdQ*t.wire.hdpe+pcQ*t.wire.clamp+peQ*t.wire.elbow+2*t.wire.tray;
    if(t.wire.battcable) mat+=t.wire.battcableQty*t.wire.battcable;
    mat+=sC*t.cons.mc4+(nP+rQ)*t.cons.lug+t.cons.comb+t.cons.grod+2*t.cons.ctie+t.cons.cement+2*t.cons.seal;

    const matSRP=Math.round(mat*(1+mk));
    const totalSRP=matSRP+t.labor;

    const spaceM2=Math.round(nP*p.area*1.4);
    const dF=DIR_F[A._roofDir||'unknown'];
    const dailyYield=actualKwp*PSH*(1-LOSS)*dF;
    const monthlySavings=Math.round(dailyYield*30*kwhRate);
    const annualSavings=monthlySavings*12;
    const roiMonths=totalSRP/monthlySavings;
    const roiYears=(roiMonths/12).toFixed(1);

    return{nP,actualKwp,sC,totalSRP,matSRP,spaceM2,dailyYield,monthlySavings,annualSavings,roiYears,roiMonths:Math.round(roiMonths),
      panelCount:nP,panelWp:p.w,invKw:inv.kw||0,battKwh:t.batt?t.batt.kwh:0};
  }

    if(A._lat)t+=`\nGPS: ${A._lat.toFixed(6)}, ${A._lng.toFixed(6)}\nMap: https://www.google.com/maps?q=${A._lat},${A._lng}\n`;
    const now=new Date();
    t+=`\n\nDate: ${now.toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})}\nPrepared by: Apollo Solar Ventures Inc.\n`;
    const blob=new Blob([t],{type:'text/plain'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`Apollo_Solar_Estimate_${(A.clientName||'Client').replace(/\s+/g,'_')}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }

  function copyAll(){
    const rows=document.querySelectorAll('#cSum .st tr');
    let t='   APOLLO SOLAR VENTURES - CLIENT DATA   \n\n';
    rows.forEach(r=>{const c=r.querySelectorAll('td');if(c.length===2)t+=c[0].textContent.trim().padEnd(20)+c[1].textContent.trim()+'\n'});
    const btn=event.target;
    navigator.clipboard.writeText(t).then(()=>{
      btn.textContent=' Copied!';
      setTimeout(()=>{btn.textContent=' Copy Summary'},2500);
    });
  }

  render();
  </script>
  </body>
  </html>
